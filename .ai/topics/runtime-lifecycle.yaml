summary:
  objective: Deterministic tenant runtime with safe identity, lifecycle, and storage semantics.

decisions:
  state_backend:
    type: sqlite
    wal_mode: enabled

  runtime_selection:
    compose_include_list: explicit_only
    compose_start_flags:
      - --no-deps
    tenant_compose_editing: forbidden_on_disk
    strategy: runtime_commands_only

  identity_model:
    tenant_id: namespaced_manifest_identity
    instance_id: immutable_internal_id
    instance_name:
      globally_unique: true
      immutable: true
      style: memorable_with_random_suffix
    command_resolution: instance_name_to_instance_id_before_execution

  credentials:
    provider_principal_from_user_input: false
    revocation_scope: instance_id_targeted_only

  lifecycle:
    up:
      - run_preflight_and_fail_fast_on_blockers
      - provision_dependencies
      - start_selected_services
      - inject_runtime_credentials
      - on_start_failure_leave_partial_state_for_debug
    down:
      - stop_selected_services_only
      - keep_database
      - keep_credentials
    clean:
      - stop_remove_selected_services
      - revoke_runtime_credentials
      - keep_database

  validation_workflow:
    standalone_preflight_command: true
    ci_cd_use_case: supported
    up_blocks_without_force: true

  safety:
    clean_confirmation:
      --yes_supported: true
      interactive_prompt_if_missing_yes: true

  concurrency:
    mutation_lock_scope_v1: global
    future_direction: per_instance_locking

  cli_targeting:
    tenant_selector: positional_tenant_id
    instance_name_selector:
      flag: --name
      short_flag: -n
    instance_id_selector:
      flag: --instance
    default_behavior:
      when_instance_unspecified: use_configured_default_instance
      on_missing_or_ambiguous_default: fail_with_actionable_guidance
    rejected_notation:
      - tenant@instance
