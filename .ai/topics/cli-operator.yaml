summary:
  objective: Define stable operator-facing CLI behavior and output semantics for v1.

decisions:
  command_surface_v1:
    - up
    - down
    - clean
    - preflight
    - reconcile
    - status
    - logs
    - ps
    - plugins

  ux_stack:
    framework: typer
    terminal_rendering: rich

  exit_behavior:
    warning_exit_code: 0
    critical_exit_code: non_zero
    category_codes:
      validation: 10
      preflight_critical_blocker: 20
      drift_critical_blocker: 30
      plugin_or_provider_failure: 40
      runtime_or_compose_failure: 50
      lock_or_concurrency_conflict: 60
      internal_unexpected_error: 70

  clean_defaults:
    remove_runtime_artifacts: true
    revoke_credentials: true
    release_hostname_bindings: true
    preserve_databases: true

  reconcile_defaults:
    mode: check
    apply_mode_requires_flag: true

  status_defaults:
    include_running_instances: true
    include_non_running_by_default: false
    include_non_running_flag: --all

  logs_defaults:
    tail_lines: 200
    follow_supported: true
    source_selection_flags_supported: true

open_questions: []
