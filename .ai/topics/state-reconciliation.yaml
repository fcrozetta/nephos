summary:
  objective: Define reliable Nephos state persistence and reconciliation behavior.

decisions:
  operations_journal:
    enabled: true

  reconciliation_triggers:
    explicit_command: true
    before_mutations: true

  drift_policy_on_mutation:
    critical_drift: block_mutations
    non_critical_drift: continue_with_warning

  source_of_truth:
    model: hybrid
    live_reads_for:
      - mutation_preflight
      - reconcile
    snapshot_cache_for:
      - status
      - list
