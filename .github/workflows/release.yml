name: release

# Triggered by a plain semver tag (X.Y.Z, no `v` prefix). The committed
# pyproject version stays 0.0.0; this workflow stamps the tag version at
# build time and attaches the wheel + sdist to the GitHub Release.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: install uv
        uses: astral-sh/setup-uv@v8

      - name: sync (committed 0.0.0)
        run: uv sync

      - name: lint + test
        run: |
          uv run ruff check
          uv run pytest -q -m "not kubernetes"

      - name: stamp version from tag
        run: uv version "${GITHUB_REF_NAME}"

      - name: build wheel + sdist
        run: uv build

      - name: github release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          # Optional: mark 0.x tags as pre-release. Disabled for now, so plain
          # X.Y.Z tags publish as full releases. Uncomment to re-enable.
          # prerelease: ${{ startsWith(github.ref_name, '0.') }}
